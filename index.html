<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4c542;
        }

        /* NAVBAR */
        nav {
            background: black;
            padding: 15px 0;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 30px;
            font-weight: 600;
            font-size: 16px;
        }

        nav a:hover {
            color: #f4c542;
        }

        
        .hero {
            width: 80%;
            margin: 30px auto;
            position: relative;
        }

        .hero img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 5px;
        }

        
        .hero::before {
            content: "";
            position: absolute;
            top: -15px;
            left: -15px;
            width: 100%;
            height: 100%;
            border: 10px solid black;
            z-index: -1;
        }

        /* TEXT SECTION */
        .content {
            width: 80%;
            margin: 40px auto;
        }

        .small-text {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 70px;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .title span {
            color: black;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .title {
                font-size: 40px;
            }

            nav a {
                display: block;
                margin: 10px 0;
            }
        }

    </style>
</head>

<body>


    <nav>

        <a href="services.html">services</a>
        <a href ="about.html">about</a>
        <a href="contact on.html">contact</a>
        <a href="explore.html">explore</a>
        <a href="Notifications.html">Notification</a>
    </nav>

    
    <div class="hero">
        <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" alt="Students">
    </div>

    <!-- TEXT -->
    <div class="content">
        <p class="small-text">Rosebank edition</p>
        <p class="small-text">WE DO IT FOR THE LOVE OF STUDENT</p>
        <h1 class="title">:STUDENT <span>CONNEC:</span></h1>
    </div>

</body>
</html>
